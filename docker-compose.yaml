services:
  aspire-dashboard:
    # ELIMINADO: container_name
    image: "mcr.microsoft.com/dotnet/aspire-dashboard:9.0"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
    restart: unless-stopped

  smart-extractor-api:
    # ELIMINADO: container_name
    build:
      context: .
      dockerfile: ./SmartExtractor.Api/Dockerfile
    image: "smart-extractor-api:latest"
    env_file:
      - .env
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080" # Esto es correcto para .NET 9/10
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "smart-extractor-api"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    # ELIMINADO: container_name
    build:
      context: ./UI/smart-extractor
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      # El DNS interno sigue siendo el nombre del servicio
      NUXT_PUBLIC_API_BASE_URL: "http://smart-extractor-api:8080"
      SMART_EXTRACTOR_API_HTTP: "http://smart-extractor-api:8080"
      services__smart-extractor-api__http__0: "http://smart-extractor-api:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "frontend"
    ports:
      - "3001:3000"
    restart: unless-stopped

networks:
  default:
    external: true
    name: dokploy-network